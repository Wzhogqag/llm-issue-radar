name: radar

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 13 * * *"  # daily at 13:17 UTC (= 21:17 Beijing); off-hour minute to avoid runner scheduling contention

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run radar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 radar.py

      - name: Refresh tracking
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tracking.py

      - name: Commit digest + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RADAR.md
          [ -f seen.json ] && git add seen.json || true
          [ -f TRACKING.md ] && git add TRACKING.md || true
          if git diff --cached --quiet; then
            echo "No change to commit."
          else
            git commit -m "radar: refresh digest ($(date -u +%F))"
            git push
          fi
