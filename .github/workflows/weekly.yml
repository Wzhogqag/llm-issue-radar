name: weekly

on:
  workflow_dispatch: {}
  schedule:
    - cron: "47 13 * * 0"  # Sundays at 13:47 UTC — 30 min after Sunday's daily run, off-round

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full history for `git log` and `git show`

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run weekly summary
        run: python3 weekly.py

      - name: Commit weekly digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f WEEKLY.md ] && git add WEEKLY.md || true
          if git diff --cached --quiet; then
            echo "No change to commit."
          else
            git commit -m "weekly: refresh trends ($(date -u +%F))"
            git push
          fi
